<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sara</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
    text-align: center;
  }

  .box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    max-width: 420px;
    transition: all 0.8s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .box.active {
    transform: translateY(-60px);
    max-width: 600px;
    padding: 50px;
  }

  h1 {
    font-size: 24px;
  }

  button {
    margin-top: 20px;
    padding: 12px 26px;
    border-radius: 25px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }

  #message {
    margin-top: 25px;
    font-size: 18px;
    line-height: 1.8;
    min-height: 200px;
  }
</style>

</head>
<body>

<div class="box" id="box">
  <h1>I have a little secret to tell you, Sara..</h1>
  <button id="revealBtn">Reveal Truth</button>

  <div id="message"></div>
</div>

<script>
const text = `From the very beginning... it was always you.

I don’t even know when it started exactly, but somewhere along the way, you became someone I couldn’t ignore... someone I couldn’t stop thinking about.

Your eyes, your voice, your personality — everything about you is so charming.

The first time I noticed you, I froze. You were that beautiful.

But the more I got to know you, the more I realized... it’s not just how you look — it’s you.

Everything about you just feels right.

I’ve liked you from the very beginning.

And I still do.`;

let i = 0;
let started = false;

function typeWriter() {
  if (i < text.length) {
    let char = text.charAt(i);

    if (char === "\n") {
      document.getElementById("message").innerHTML += "<br>";
    } else {
      document.getElementById("message").innerHTML += char;
    }

    i++;
    setTimeout(typeWriter, 25);
  }
}

document.getElementById("revealBtn").addEventListener("click", function() {
  if (started) return; // prevent double click bug
  started = true;

  document.getElementById("box").classList.add("active");

  setTimeout(() => {
    typeWriter();
  }, 500);
});
</script>

</body>
  </html>
