<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sara</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://i.pinimg.com/originals/8f/5c/5e/8f5c5e5c5f9f5e0a6b9e4f2a7f0b8c2d.jpg') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
  }

  .box {
    background: rgba(0,0,0,0.55);
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    max-width: 520px;
  }

  button {
    margin-top: 20px;
    padding: 12px 26px;
    border: none;
    border-radius: 25px;
    background: pink;
    cursor: pointer;
  }

  #message {
    margin-top: 20px;
    display: none;
  }
</style>

</head>
<body>

<div class="box">
  <h1>I have a little secret to tell you, Sara..</h1>
  <button id="revealBtn">Reveal Truth</button>

  <div id="message">
    <p>
      From the very beginning… I liked you.<br><br>
      Your eyes, your voice, your personality — everything about you is so charming.<br><br>
      The first time I saw you, I froze… you were that beautiful.<br><br>
      And the more I got to know you, the more I realized… I really like you.
    </p>
  </div>
</div>

<script>
document.getElementById("revealBtn").addEventListener("click", function() {
  document.getElementById("message").style.display = "block";
});
</script>

</body>
</html>
