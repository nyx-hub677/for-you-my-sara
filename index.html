<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sara</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
    text-align: center;
  }

  .box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    max-width: 420px;
    transition: all 0.8s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .box.active {
    transform: translateY(-60px);
    max-width: 600px;
    padding: 50px;
  }

  h1 {
    font-size: 24px;
  }

  button {
    margin-top: 20px;
    padding: 12px 26px;
    border-radius: 25px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }

  #message {
    margin-top: 25px;
    font-size: 18px;
    line-height: 1.8;
    min-height: 200px;
    white-space: pre-line;
  }
</style>

</head>
<body>

<div class="box" id="box">
  <h1>I have a little secret to tell you, Sara..</h1>
  <button id="revealBtn">Reveal Truth</button>

  <div id="message"></div>
</div>

<script>
const text = `From the very beginning… it was always you.

I don’t even know when it started exactly, but somewhere along the way, you became someone I couldn’t ignore… someone I couldn’t stop thinking about.

Your eyes… the way they look, the way they express so much without even trying…  
Your voice… it’s soft, comforting, and somehow it stays in my head longer than it should…  
And your personality… it’s honestly the most beautiful part about you. The way you think, the way you talk, the way you exist… it’s all so effortlessly charming.

The first time I really noticed you… I froze.  
Not even joking — I just sat there thinking, “how can someone be this beautiful?”

But the more I got to know you, the more I realized… it’s not just your beauty that caught me.

It’s you.

Everything about you just feels… right.

And I don’t think I’ve ever said this properly, but  
I’ve liked you from the very beginning.

And I still do.`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 25);
  }
}

document.getElementById("revealBtn").addEventListener("click", function() {
  document.getElementById("box").classList.add("active");

  setTimeout(() => {
    typeWriter();
  }, 500);
});
</script>

</body>
</html>
